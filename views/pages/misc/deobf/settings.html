<div class="settings-content">
  <div class="settings-header">
    <p class="cseltitle-main">Settings</p>
    <i class="far fa-times-circle close-settings-btn"></i>
  </div>
  <div class="settings-content-body">
    <div class="csel-container-left">
      <p class="cseltitle">{{mask}}{{Browser Tab Cloak}}</p>
      <form id="titleform" class="cloakform">
        <input
          type="text"
          placeholder="Enter a tab title here..."
          spellcheck="false"
        />
        <input type="submit" value="Apply" />
      </form>
      <form id="iconform" class="cloakform">
        <input
          type="text"
          placeholder="Enter an icon URL here..."
          spellcheck="false"
        />
        <input type="submit" value="Apply" />
      </form>
      <a href="{{route}}{{/questions}}">{{mask}}{{Find Icon URL}}</a>
      <p class="cseltitle">{{mask}}{{Wisp Protocol Transport}}</p>
      <div class="radio-group {{wisp-transport}}-list">
        <label>
          <p>
            {{mask}}{{Libcurl}}
            <span class="default-badge"
              >{{mask}}{{Cross-Browser/Secure (Firefox)}}</span
            >
          </p>
          <input
            type="radio"
            name="{{wisp-transport}}"
            value="{{libcurl}}"
            checked
          />
        </label>
        <label>
          <p>
            {{mask}}{{Epoxy}}
            <span class="alt-badge"
              >{{mask}}{{Fastest/Secure (Chromium, Apple)}}</span
            >
          </p>
          <input type="radio" name="{{wisp-transport}}" value="{{epoxy}}" />
        </label>
      </div>
      <p class="cseltitle">{{mask}}{{Wisp Protocol URL}}</p>
      <form
        id="wispurlform-csel"
        class="cloakform wisp-url-form wisp-url-form-compact"
        autocomplete="off"
      >
        <input
          type="text"
          class="wisp-url"
          placeholder="wss://example.com/wisp/"
          spellcheck="false"
          autocomplete="off"
        />
        <input type="submit" value="Apply" />
        <button type="button" class="wisp-url-reset">Reset</button>
      </form>
      <p class="cseltitle">Advanced Options</p>
      <div class="radio-group">
        <label>
          <p>
            {{mask}}{{Prevent Tab Leaks}}
            <span class="default-badge"
              >{{mask}}{{Breaks Some Sites}}</span
            >
          </p>
          <input type="checkbox" class="switch sandbox" />
        </label>
        <label>
          <p>
            Hide Ads
            <span class="default-badge">{{mask}}{{Layered Adblocking}}</span>
          </p>
          <input type="checkbox" class="switch hideads" checked />
        </label>
        <label>
          <p>
            {{mask}}{{Enable Tor/Rotate IP}}
            <span class="alt-badge">{{mask}}{{Onion Browser Routing}}</span>
          </p>
          <input type="checkbox" class="switch useonion" />
        </label>
        <label>
          <p>
            Enable Autocomplete
            <span class="default-badge">{{mask}}{{Proxied Suggestions}}</span>
          </p>
          <input type="checkbox" class="switch useac" checked />
        </label>
      </div>
    </div>
    <div class="csel-container-right">
      <p class="cseltitle">Search Engine</p>
      <select class="search-engine-list">
        <option>{{DuckDuckGo}}</option>
        <option>{{Bing}}</option>
        <option>{{Brave}}</option>
        <option>{{Startpage}}</option>
      </select>
      <p class="cseltitle">Select Theme</p>
      <div class="radio-group theme-list">
        <label>
          <p>Enable Default (Dark) Theme</p>
          <input type="radio" name="theme" value="dark" checked />
        </label>
        <label>
          <p>Enable Light Theme</p>
          <input type="radio" name="theme" value="light" />
        </label>
        <label>
          <p>Enable Nordish Theme</p>
          <input type="radio" name="theme" value="nord" checked />
        </label>
      </div>
      <p class="cseltitle">Icon Presets</p>
      <select id="icon-list">
        <option><!-- Leave this blank to avoid a bug. --></option>
        <option>{{Google}}</option>
        <option>{{Bing}}</option>
        <option>{{Google}} Drive</option>
        <option>Gmail</option>
      </select>
      <p class="cseltitle">Experimental Settings</p>
      <div class="radio-group">
        <label>
          <p>
            {{mask}}{{Region}}
            <span class="default-badge">{{mask}}{{Swap Proxy Region}}</span>
          </p>
          <select class="region-list">
            <option value="off">Off</option>
            <option value="eu">Sweden</option>
            <option value="jp">Japan</option>
          </select>
        </label>
        <label>
          <p>
            {{mask}}{{Hide History}}
            <span class="default-badge">{{mask}}{{Experimental}}</span>
          </p>
          <select class="history-toggle">
            <option value="none">Off</option>
            <option value="hidehistory">Enabled</option>
          </select>
        </label>
        <label>
          <p>
            {{mask}}{{Window Type}}
            <span class="default-badge">{{mask}}{{about:blank | blob}}</span>
          </p>
          <select class="cloak-type-list">
            <option name="cloak-type" value="none" checked>Off</option>
            <option name="cloak-type" value="blank">{{mask}}{{about:blank}}</option>
            <option name="cloak-type" value="blob">{{mask}}{{blob}}</option>
          </select>
        </label>
        <label>
          <p>
            {{mask}}{{Open in New Stealth Tab}}
            <span class="default-badge">{{mask}}{{Multi-frame browsing}}</span>
          </p>
          <input type="checkbox" class="switch newtabframe" />
        </label>
      </div>
    </div>
  </div>
</div>
