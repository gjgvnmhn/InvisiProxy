<!doctype html>
<html>
  <head>
    <title>{{mask}}{{InvisiProxy LTS}}</title>
    {{ifSEO}}{{
    <meta
      name="description"
      content="InvisiProxy is a secure web proxy service with support for many sites. Bypass filters and freely enjoy a safer private browsing experience or unblock websites on devices such as Chromebooks and at places like school or work without downloading anything."
    />
    }}
    <!--HEAD-CONTENT-->
    <script src="{{route}}{{/scram/scramjet.js}}" defer data-module></script>
    <script src="{{route}}{{/scram/controller.api.js}}" defer data-module></script>
    <script src="{{route}}{{/baremux/index.js}}" defer data-module></script>
    <script src="{{route}}{{/uv/uv.bundle.js}}" defer data-module></script>
    <script src="{{route}}{{/uv/uv.config.js}}" defer data-module></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/tippy.js@6/dist/backdrop.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/tippy.js@6/animations/shift-away.css"
    />
    {{inline}}{{
    <script src="{{route}}{{/assets/js/register-sw.js}}{{inline}}" defer></script>
    <script src="{{route}}{{assets/js/csel.js}}{{inline}}" defer></script>
    <script src="{{route}}{{assets/js/common.js}}{{inline}}" defer></script>
    }}
  </head>

  <body>
    <!-- IMPORTANT-IVINSERT-DONOTDELETE -->
    <!--ANTI-EXFIL-->
    <div class="loader loader-active">
      <div class="loader-w"></div>
    </div>
    <div class="omnibar" id="pr-sj">
      <a class="logo" href="{{route}}{{/browsing}}" role="img" aria-label="InvisiProxy Logo"></a>
      <button title="Back"><i class="fas fa-arrow-left"></i></button>
      <button title="Forward"><i class="fas fa-arrow-right"></i></button>
      <button title="Refresh"><i class="fas fa-redo-alt"></i></button>
      <button title="New Stealth Tab" id="new-stealth-tab">
        <i class="fas fa-external-link-alt"></i>
      </button>
      <div class="search-box">
        <input
          class="glowbutton"
          id="search-input"
          type="text"
          placeholder="Type a URL or search..."
          spellcheck="false"
          autocomplete="off"
        />
        <ul id="autocomplete"></ul>
      </div>
      <!-- 
      <button title="Bookmarks" id="bookmarks-toggle">
        <i class="fas fa-bookmark"></i>
      </button>
      -->
      <div title="Settings" class="dropdown-parent">
        <a href="#" tabindex="0">
          <i class="fas fa-cog pulse" aria-hidden="true"></i>
        </a>
        <div
          class="dropdown-settings"
          tabindex="0"
          role="menu"
          aria-label="Settings menu"
        >
          <div id="csel">
            <!--SETTINGS-->
          </div>
        </div>
      </div>
      <button id="omnibar-toggle" title="Hide Bar">
        <i class="fas fa-chevron-up"></i>
      </button>
    </div>
    <!-- IMPORTANT-IVINSERT-DONOTDELETE -->
    <iframe id="frame" allow="fullscreen" autofocus></iframe>
    <!-- IMPORTANT-IVINSERT-DONOTDELETE -->
    <script>
      const windowFrame = document.getElementById('frame');
      const omnibar = document.getElementById('pr-sj');
      const toggle = document.getElementById('omnibar-toggle');
      const backArrow = omnibar.querySelector("[title='Back' i]");
      const forwardArrow = omnibar.querySelector("[title='Forward' i]");
      const reloadArrow = omnibar.querySelector("[title='Refresh' i]");
      const newTabButton = document.getElementById('new-stealth-tab');
      const searchInput = document.getElementById('search-input');
      let hidden = false;

      let currentRealUrl = '';
      let userIsEditing = false;
      let lastSyncedValue = '';

      const SJ_PATH_PREFIX = '{{route}}{{/scram/network/}}';
      const UV_PATH_PREFIX_FALLBACK = '{{route}}{{/uv/service/}}';

      const tryDecodeScramjetUrl = (raw) => {
        try {
          const parsed = new URL(raw, location.origin);
          const path = parsed.pathname;
          if (path.startsWith(SJ_PATH_PREFIX)) {
            const rest = path.slice(SJ_PATH_PREFIX.length);
            const decoded = decodeURIComponent(rest);
            const match = decoded.match(/https?:\/\/[^\s]+/);
            if (match) return match[0] + (parsed.search || '') + (parsed.hash || '');
          }
          return null;
        } catch (e) {
          return null;
        }
      };

      const tryDecodeUvUrl = (raw) => {
        try {
          const parsed = new URL(raw, location.origin);
          const cfg = self['{{__uv$config}}'];
          if (!cfg || typeof cfg.decodeUrl !== 'function') return null;
          const prefix = cfg.prefix || UV_PATH_PREFIX_FALLBACK;
          if (!parsed.pathname.startsWith(prefix)) return null;
          return cfg.decodeUrl(parsed.pathname.slice(prefix.length));
        } catch (e) {
          return null;
        }
      };

      const computeDisplayUrl = () => {
        let frameHref = '';
        try {
          frameHref = windowFrame.contentWindow.location.href || '';
        } catch (e) {
          frameHref = windowFrame.getAttribute('src') || '';
        }
        if (!frameHref || frameHref === 'about:blank') return '';

        const sjDecoded = tryDecodeScramjetUrl(frameHref);
        if (sjDecoded) return sjDecoded;
        const uvDecoded = tryDecodeUvUrl(frameHref);
        if (uvDecoded) return uvDecoded;

        return frameHref;
      };

      const syncOmnibox = () => {
        if (userIsEditing) return;
        const display = computeDisplayUrl();
        currentRealUrl = display;
        if (!searchInput) return;
        if (lastSyncedValue === display) return;
        searchInput.value = display;
        lastSyncedValue = display;
      };

      if (searchInput) {
        searchInput.addEventListener('focus', () => {
          userIsEditing = true;
        });
        searchInput.addEventListener('blur', () => {
          userIsEditing = false;
          setTimeout(syncOmnibox, 50);
        });
      }

      if (newTabButton) {
        newTabButton.addEventListener('click', () => {
          const target = computeDisplayUrl() || currentRealUrl || '';
          try {
            const framePath = '{{route}}{{/s}}';
            const url = new URL(framePath, location.origin);
            if (target) url.searchParams.set('url', target);
            url.searchParams.set('cache', String(Date.now()));
            window.open(url.href, '_blank');
          } catch (e) {
            window.open('{{route}}{{/s}}', '_blank');
          }
        });
      }

      toggle.addEventListener('click', () => {
        hidden = !hidden;
        omnibar.classList.toggle('omnibar-hidden', hidden);
        toggle.classList.toggle('omnibar-s', hidden);
        toggle.innerHTML = `<i class="fas fa-chevron-${hidden ? 'down' : 'up'}"></i>`;
        (hidden ? document.body : omnibar).appendChild(toggle);
        toggle.title = hidden ? 'Show Bar' : 'Hide Bar';
      });

      backArrow.addEventListener('click', () => {
        history.back();
      });
      forwardArrow.addEventListener('click', () => {
        history.forward();
      });
      reloadArrow.addEventListener('click', () => {
        windowFrame.contentWindow.location.reload();
      });

      let statusObject = { isLoading: true, timesErrored: 0 };

      const loaderTimeout = (timeout) => {
        statusObject.isLoading = true;
        setTimeout(() => {
          if (statusObject.isLoading)
            loader.classList.toggle('loader-active', false);
        }, timeout);
      };

      const errorRefresh = () => {
        const shouldRefresh =
          statusObject.timesErrored <= 5 &&
          windowFrame.contentWindow.document.head.querySelector(
            "meta[itemprop='http-status'][content='404']"
          );
        if (shouldRefresh) {
          statusObject.timesErrored++;
          windowFrame.contentWindow.location.reload();
        } else statusObject.timesErrored = 0;
        return shouldRefresh;
      };

      const applySandbox = () => {
        const sandboxEnabled =
          localStorage.getItem('{{hu-lts}}-storage') &&
          JSON.parse(localStorage.getItem('{{hu-lts}}-storage')).Sandbox;
        const sandboxPermissions =
          'allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-presentation allow-same-origin allow-scripts allow-downloads';

        if (sandboxEnabled) {
          windowFrame.setAttribute('sandbox', sandboxPermissions);
        } else {
          windowFrame.removeAttribute('sandbox');
        }
      };

      const loader = document.getElementsByClassName('loader')[0];
      const updateLoader = () => {
        if (windowFrame.contentWindow.location.href === 'about:blank') return;

        statusObject.isLoading =
          windowFrame.contentWindow.document.readyState === 'loading';

        // Do not remove the loading screen if the page is an error page
        // and should be reloaded.
        if (!statusObject.isLoading && errorRefresh()) {
          statusObject.isLoading = true;
          return;
        }

        // Display the loading screen if statusObject.isLoading is true.
        loader.classList.toggle('loader-active', statusObject.isLoading);

        // Remove the loading screen if it takes longer than 10 seconds.
        if (statusObject.isLoading) loaderTimeout(10000);
      };

      // Reattach load events whenever the content window has changed.
      const loadHandler = () => {
        setTimeout(() => {
          try {
            windowFrame.contentWindow.addEventListener('beforeunload', () => {
              loader.classList.toggle('loader-active', true);
              loaderTimeout(5000);
            });
            windowFrame.contentWindow.addEventListener('unload', loadHandler);
            windowFrame.contentWindow.addEventListener(
              'readystatechange',
              updateLoader
            );
            windowFrame.contentWindow.addEventListener('hashchange', syncOmnibox);
            windowFrame.contentWindow.addEventListener('popstate', syncOmnibox);
          } catch {}
          updateLoader();
          syncOmnibox();
          applySandbox();
        });
      };

      windowFrame.addEventListener('load', () => {
        updateLoader();
        syncOmnibox();
      });
      loadHandler();

      setInterval(() => {
        if (!userIsEditing) syncOmnibox();
      }, 1500);

      const cosmeticPending = new Map();
      navigator.serviceWorker?.addEventListener?.('message', (e) => {
        if (!e.data || e.data.type !== 'invisi-ubo-cosmetic-reply') return;
        const cb = cosmeticPending.get(e.data.id);
        if (cb) {
          cosmeticPending.delete(e.data.id);
          cb(e.data.selectors || []);
        }
      });
      const requestCosmetics = (host) => {
        if (!navigator.serviceWorker?.controller || !host)
          return Promise.resolve([]);
        return new Promise((resolve) => {
          const id =
            (crypto.randomUUID && crypto.randomUUID()) ||
            String(Math.random()).slice(2);
          cosmeticPending.set(id, resolve);
          navigator.serviceWorker.controller.postMessage({
            type: 'invisi-ubo-cosmetic',
            id,
            host,
          });
          setTimeout(() => {
            if (cosmeticPending.has(id)) {
              cosmeticPending.delete(id);
              resolve([]);
            }
          }, 1500);
        });
      };
      const applyCosmetics = async () => {
        const display = computeDisplayUrl();
        let host = '';
        try {
          host = new URL(display, location.origin).hostname;
        } catch {}
        if (!host) return;
        const selectors = await requestCosmetics(host);
        if (!selectors.length) return;
        try {
          const doc = windowFrame.contentWindow?.document;
          if (!doc) return;
          let style = doc.getElementById('__invisi_cosmetic');
          if (!style) {
            style = doc.createElement('style');
            style.id = '__invisi_cosmetic';
            (doc.head || doc.documentElement).appendChild(style);
          }
          style.textContent = selectors.join(',') + '{display:none!important;}';
        } catch {}
      };
      windowFrame.addEventListener('load', applyCosmetics);
    </script>
  </body>
</html>
